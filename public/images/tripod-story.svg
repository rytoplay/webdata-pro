<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 300" width="280" height="300">
  <rect width="280" height="300" fill="#c8dea8"/>
  <!-- Ground -->
  <rect x="0" y="210" width="280" height="90" fill="#5a8a3a"/>
  <!-- Tree -->
  <rect x="220" y="130" width="12" height="85" fill="#6b4c2a"/>
  <circle cx="226" cy="115" r="38" fill="#2d7a1e"/>
  <!-- Dog body -->
  <ellipse cx="130" cy="218" rx="80" ry="60" fill="#c8832a"/>
  <!-- Only 3 legs visible! -->
  <rect x="80"  y="255" width="22" height="40" rx="8" fill="#b07020"/>
  <rect x="140" y="255" width="22" height="40" rx="8" fill="#b07020"/>
  <rect x="175" y="250" width="22" height="38" rx="8" fill="#b07020"/>
  <!-- Stub of missing leg -->
  <rect x="68" y="245" width="18" height="18" rx="8" fill="#b07020"/>
  <!-- Head -->
  <circle cx="80" cy="175" r="60" fill="#c8832a"/>
  <circle cx="80" cy="175" r="54" fill="#d4914a"/>
  <!-- Ears -->
  <path d="M38 148 Q14 130 20 168 Q24 188 42 188Z" fill="#b07020"/>
  <path d="M122 148 Q146 130 140 168 Q136 188 118 188Z" fill="#b07020"/>
  <!-- Snout -->
  <ellipse cx="80" cy="194" rx="28" ry="20" fill="#c8832a"/>
  <!-- Eyes — happy! -->
  <circle cx="63" cy="163" r="11" fill="#fff"/>
  <circle cx="97" cy="163" r="11" fill="#fff"/>
  <circle cx="63" cy="163" r="7" fill="#4a2800"/>
  <circle cx="97" cy="163" r="7" fill="#4a2800"/>
  <circle cx="60" cy="160" r="2.5" fill="#fff"/>
  <circle cx="94" cy="160" r="2.5" fill="#fff"/>
  <!-- Nose -->
  <ellipse cx="80" cy="188" rx="14" ry="9" fill="#222"/>
  <!-- Happy mouth -->
  <path d="M65 198 Q80 210 95 198" stroke="#8a4010" stroke-width="2.5" fill="none"/>
  <!-- Tongue out -->
  <path d="M73 205 Q80 215 87 205" fill="#e07090"/>
  <line x1="80" y1="205" x2="80" y2="215" stroke="#c05070" stroke-width="1.5"/>
  <!-- Bandana -->
  <path d="M45 205 Q80 225 115 205 Q100 220 80 225 Q60 220 45 205Z" fill="#2d5a27"/>
  <circle cx="65" cy="213" r="2" fill="rgba(255,255,255,0.5)"/>
  <circle cx="75" cy="217" r="2" fill="rgba(255,255,255,0.5)"/>
  <circle cx="85" cy="217" r="2" fill="rgba(255,255,255,0.5)"/>
  <circle cx="95" cy="213" r="2" fill="rgba(255,255,255,0.5)"/>
  <!-- Tail wagging -->
  <path d="M205 200 Q240 165 255 140" stroke="#c8832a" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M255 140 Q265 120 258 108" stroke="#b07020" stroke-width="10" fill="none" stroke-linecap="round"/>
</svg>
