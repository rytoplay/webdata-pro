<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- House body -->
  <rect x="15" y="45" width="70" height="48" rx="3" fill="#f5f0e8"/>
  <!-- Roof -->
  <polygon points="50,10 10,48 90,48" fill="#e07b39"/>
  <!-- Door -->
  <rect x="38" y="68" width="24" height="25" rx="3" fill="#2d5a27"/>
  <!-- Door knob -->
  <circle cx="59" cy="82" r="2.5" fill="#e07b39"/>
  <!-- Window left -->
  <rect x="18" y="55" width="18" height="16" rx="2" fill="#b8d4f0"/>
  <line x1="27" y1="55" x2="27" y2="71" stroke="#fff" stroke-width="1.5"/>
  <line x1="18" y1="63" x2="36" y2="63" stroke="#fff" stroke-width="1.5"/>
  <!-- Window right -->
  <rect x="64" y="55" width="18" height="16" rx="2" fill="#b8d4f0"/>
  <line x1="73" y1="55" x2="73" y2="71" stroke="#fff" stroke-width="1.5"/>
  <line x1="64" y1="63" x2="82" y2="63" stroke="#fff" stroke-width="1.5"/>
  <!-- Dog (left of house) -->
  <ellipse cx="24" cy="88" rx="10" ry="7" fill="#c8956a"/>
  <circle cx="18" cy="83" r="6" fill="#c8956a"/>
  <ellipse cx="14" cy="81" rx="3" ry="4" fill="#b07a55" transform="rotate(-20 14 81)"/>
  <circle cx="16" cy="81.5" r="1.5" fill="#222"/>
  <ellipse cx="26" cy="93" rx="2.5" ry="1.5" fill="#b07a55"/>
  <ellipse cx="21" cy="93" rx="2.5" ry="1.5" fill="#b07a55"/>
  <!-- Tail -->
  <path d="M34 86 Q42 78 36 74" stroke="#c8956a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Cat (right of house) -->
  <ellipse cx="76" cy="88" rx="10" ry="7" fill="#888"/>
  <circle cx="82" cy="83" r="6" fill="#888"/>
  <!-- Cat ears -->
  <polygon points="78,78 80,72 83,78" fill="#888"/>
  <polygon points="84,78 87,72 89,78" fill="#888"/>
  <circle cx="84" cy="82" r="1.5" fill="#222"/>
  <!-- Cat tail -->
  <path d="M66 88 Q58 78 64 74" stroke="#888" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
